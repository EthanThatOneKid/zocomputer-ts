name: Nightly release

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Publish even if openapi.json did not change'
        required: false
        default: 'false'

permissions:
  contents: write
  id-token: write

concurrency:
  group: zocomputer-nightly-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Sync latest OpenAPI spec
        run: npm run sync:openapi

      - name: Detect spec changes
        id: changes
        env:
          FORCE_PUBLISH: ${{ github.event.inputs.force_publish || 'false' }}
        run: |
          if [ "$FORCE_PUBLISH" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet -- openapi/openapi.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when nothing changed
        if: steps.changes.outputs.changed != 'true'
        run: echo "openapi.json unchanged; skipping release"

      - name: Regenerate client
        if: steps.changes.outputs.changed == 'true'
        run: npm run generate

      - name: Build package
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        id: version
        run: |
          npm version patch --no-git-tag-version
          VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit release snapshot
        if: steps.changes.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openapi/openapi.json src/generated package.json package-lock.json
          git commit -m "chore(release): publish v$VERSION"
          git tag "v$VERSION"

      - name: Publish to npm
        if: steps.changes.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Push release commit and tag
        if: steps.changes.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: git push origin main --follow-tags
